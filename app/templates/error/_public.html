{% macro public_error(title, message, action_url=None, action_label=None) %}
<div class="h-screen w-screen flex items-center justify-center bg-background">
  <div class="max-w-sm text-center px-6">
    <h1 class="h4">{{ title }}</h1>
    <p class="text-muted-foreground mt-2 text-sm">{{ message }}</p>
    {% if action_url and action_label %}
      <a class="btn-sm mt-4" href="{{ action_url }}">{{ action_label }}</a>
    {% endif %}
  </div>
</div>
{% endmacro %}
