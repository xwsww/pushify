# pushify-crowdsec-scenario-v1 — per-IP HTTP flood (Traefik JSON access log)
type: leaky
name: pushify/http-flood
description: Ban clients hammering sites via Traefik
filter: >-
  evt.Meta.service == 'http'
  && evt.Meta.log_type in ['http_access-log', 'http_access-log-v2']
  && evt.Parsed.remote_addr != ''
groupby: evt.Parsed.remote_addr
capacity: 40
leakspeed: 2s
labels:
  service: http
  type: ban
  remediation: true
