# Panel on HTTP only (DEVPUSH_ENABLE_HTTPS=0). Deploy HTTPS routers unchanged.
services:
  app:
    labels:
      - traefik.http.routers.app.entrypoints=web
      - traefik.http.routers.app.priority=10
      - traefik.http.routers.app.middlewares=pushify-inflight-panel@file,pushify-ratelimit-panel@file,pushify-headers@file

  phpmyadmin:
    labels:
      - traefik.http.routers.phpmyadmin.entrypoints=web
      - traefik.http.routers.phpmyadmin.priority=9
      - traefik.http.routers.phpmyadmin.middlewares=pushify-inflight-panel@file,pushify-ratelimit-panel@file,pushify-headers@file

  traefik:
    ports:
      - "80:80"
      - "443:443"
    labels:
      - "traefik.http.routers.deployment-not-found-https.rule=HostRegexp(`^(.+)\\.${DEPLOY_DOMAIN}$`) && !PathPrefix(`/.pushify`) && !PathPrefix(`/errors`)"
      - "traefik.http.routers.deployment-not-found-https.entrypoints=websecure"
      - "traefik.http.routers.deployment-not-found-https.tls=true"
      - "traefik.http.routers.deployment-not-found-https.tls.certresolver=le"
      - "traefik.http.routers.deployment-not-found-https.priority=1"
      - "traefik.http.routers.deployment-not-found-https.service=noop@internal"
      - "traefik.http.routers.deployment-not-found-https.middlewares=deployment-redirect"
      - "traefik.http.middlewares.deployment-redirect.redirectRegex.replacement=https://$$1/errors/503"
      - "traefik.http.routers.pushify-deploy-challenge-https.rule=HostRegexp(`^.+\\.${DEPLOY_DOMAIN}$`) && PathPrefix(`/.pushify`)"
      - "traefik.http.routers.pushify-deploy-challenge-https.entrypoints=websecure"
      - "traefik.http.routers.pushify-deploy-challenge-https.tls=true"
      - "traefik.http.routers.pushify-deploy-challenge-https.tls.certresolver=le"
      - "traefik.http.routers.pushify-deploy-challenge-https.priority=25"
      - "traefik.http.routers.pushify-deploy-challenge-https.service=pushify-security@file"
      - "traefik.http.routers.pushify-deploy-errors-https.rule=HostRegexp(`^.+\\.${DEPLOY_DOMAIN}$`) && PathPrefix(`/errors`)"
      - "traefik.http.routers.pushify-deploy-errors-https.entrypoints=websecure"
      - "traefik.http.routers.pushify-deploy-errors-https.tls=true"
      - "traefik.http.routers.pushify-deploy-errors-https.tls.certresolver=le"
      - "traefik.http.routers.pushify-deploy-errors-https.priority=24"
      - "traefik.http.routers.pushify-deploy-errors-https.service=pushify-security@file"
