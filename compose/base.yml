services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      args:
        APP_UID: ${SERVICE_UID:-1000}
        APP_GID: ${SERVICE_GID:-1000}
    entrypoint: /entrypoint.app.sh
    restart: always
    oom_score_adj: -800
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      postgres-storage:
        condition: service_healthy
    networks:
      - default
      - internal
      - runner
    env_file:
      - ${DATA_DIR:-../data}/.env
    environment:
      HOST_DATA_DIR: ${DATA_DIR:-../data}
      HOST_APP_DIR: ${APP_DIR:-/opt/devpush}
      SERVICE_UID: ${SERVICE_UID}
      SERVICE_GID: ${SERVICE_GID}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    volumes:
      - ${DATA_DIR:-../data}:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${APP_HOSTNAME}`)"
      - "traefik.http.routers.app.service=app@docker"
      - "traefik.http.services.app.loadbalancer.server.port=8000"
      - "traefik.http.services.pushify-security.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.devpush-errors.errors.status=502-504"
      - "traefik.http.middlewares.devpush-errors.errors.service=app@docker"
      - "traefik.http.middlewares.devpush-errors.errors.query=/errors/{status}"
      - "traefik.docker.network=devpush_default"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s

  worker-jobs:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      args:
        APP_UID: ${SERVICE_UID:-1000}
        APP_GID: ${SERVICE_GID:-1000}
    entrypoint: /entrypoint.worker-jobs.sh
    restart: always
    oom_score_adj: -700
    stop_grace_period: ${JOB_TIMEOUT_SECONDS:-320}s
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      postgres-storage:
        condition: service_healthy
    networks:
      - default
      - internal
      - runner
    env_file:
      - ${DATA_DIR:-../data}/.env
    environment:
      HOST_DATA_DIR: ${DATA_DIR:-../data}
      HOST_APP_DIR: ${APP_DIR:-/opt/devpush}
      SERVICE_UID: ${SERVICE_UID}
      SERVICE_GID: ${SERVICE_GID}
    volumes:
      - ${DATA_DIR:-../data}:/data
    healthcheck:
      test: ["CMD", "/healthcheck.worker-jobs.sh"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 90s

  worker-monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
      args:
        APP_UID: ${SERVICE_UID:-1000}
        APP_GID: ${SERVICE_GID:-1000}
    entrypoint: /entrypoint.worker-monitor.sh
    restart: always
    oom_score_adj: -700
    depends_on:
      redis:
        condition: service_healthy
      pgsql:
        condition: service_healthy
    networks:
      - default
      - internal
      - runner
    env_file:
      - ${DATA_DIR:-../data}/.env
    environment:
      HOST_DATA_DIR: ${DATA_DIR:-../data}
      HOST_APP_DIR: ${APP_DIR:-/opt/devpush}
      SERVICE_UID: ${SERVICE_UID}
      SERVICE_GID: ${SERVICE_GID}
    volumes:
      - ${DATA_DIR:-../data}:/data

  redis:
    image: redis:alpine
    restart: always
    oom_score_adj: -800
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  docker-proxy:
    image: tecnativa/docker-socket-proxy
    restart: always
    oom_score_adj: -900
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - INFO=1
      - SYSTEM=1
      - POST=1
      - EXEC=1
      - NETWORKS=1
      - DISABLE_IPV6=1
    networks:
      - internal

  traefik:
    image: traefik:v3.6.2
    restart: always
    oom_score_adj: -900
    depends_on:
      - docker-proxy
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=tcp://docker-proxy:2375"
      - "--providers.docker.watch=true"
      - "--providers.file.directory=/etc/traefik/dynamic_conf"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.middlewares=pushify-edge-guard@file"
      - "--entrypoints.web.asDefault=false"
      - "--global.sendAnonymousUsage=false"
      - "--global.checkNewVersion=false"
      - "--api.insecure=false"
      - "--ping=false"
    networks:
      - default
      - internal
      - runner
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.deployment-not-found.rule=HostRegexp(`^(.+)\\.${DEPLOY_DOMAIN}$`) && !PathPrefix(`/.pushify`) && !PathPrefix(`/errors`)"
      - "traefik.http.routers.deployment-not-found.entrypoints=web"
      - "traefik.http.routers.deployment-not-found.priority=1"
      - "traefik.http.routers.deployment-not-found.service=noop@internal"
      - "traefik.http.routers.deployment-not-found.middlewares=deployment-redirect"
      - "traefik.http.middlewares.deployment-redirect.redirectRegex.regex=^https?://([^/]+)"
      - "traefik.http.middlewares.deployment-redirect.redirectRegex.permanent=false"
      - "traefik.http.middlewares.deployment-redirect.redirectRegex.replacement=https://$$1/errors/503"
      - "traefik.http.routers.pushify-deploy-challenge.rule=HostRegexp(`^.+\\.${DEPLOY_DOMAIN}$`) && PathPrefix(`/.pushify`)"
      - "traefik.http.routers.pushify-deploy-challenge.entrypoints=web"
      - "traefik.http.routers.pushify-deploy-challenge.priority=25"
      - "traefik.http.routers.pushify-deploy-challenge.service=pushify-security@file"
      - "traefik.http.routers.pushify-deploy-errors.rule=HostRegexp(`^.+\\.${DEPLOY_DOMAIN}$`) && PathPrefix(`/errors`)"
      - "traefik.http.routers.pushify-deploy-errors.entrypoints=web"
      - "traefik.http.routers.pushify-deploy-errors.priority=24"
      - "traefik.http.routers.pushify-deploy-errors.service=pushify-security@file"

  pgsql:
    image: postgres:16
    restart: always
    oom_score_adj: -800
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - internal
    environment:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      POSTGRES_DB: ${POSTGRES_DB:-devpush}
      POSTGRES_USER: ${POSTGRES_USER:-devpush-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - devpush-db:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  mariadb:
    image: mariadb:11.8
    restart: always
    networks:
      - internal
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-}
      MARIADB_ROOT_HOST: "%"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - devpush-mariadb:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -uroot -p\"$${MARIADB_ROOT_PASSWORD}\" --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  postgres-storage:
    image: postgres:16
    restart: always
    networks:
      - internal
    environment:
      POSTGRES_USER: ${POSTGRES_STORAGE_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_STORAGE_PASSWORD:-}
      POSTGRES_DB: postgres
    volumes:
      - devpush-postgres-storage:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d postgres",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/devpush/phpmyadmin-bootstrap/docker-entrypoint.sh"]
    networks:
      - default
      - internal
    environment:
      DEVPUSH_SIGNON_SECRET: ${SECRET_KEY}
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 256M
    volumes:
      - ../docker/phpmyadmin:/devpush/phpmyadmin-bootstrap:ro
      - ../docker/phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
      - ../docker/phpmyadmin/signon-script.php:/etc/phpmyadmin/signon-script.php:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`${PHPMYADMIN_HOSTNAME:-db.${APP_HOSTNAME}}`)"
      - "traefik.http.routers.phpmyadmin.service=phpmyadmin@docker"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
      - "traefik.docker.network=devpush_default"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /var/www/html/devpush-login.php && curl -fsS -o /dev/null http://127.0.0.1/index.php",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  adminer:
    image: adminer:4.8.1
    restart: always
    depends_on:
      postgres-storage:
        condition: service_healthy
    networks:
      - default
      - internal
    environment:
      ADMINER_DEFAULT_SERVER: postgres-storage
      ADMINER_DEFAULT_PORT: 5432
      ADMINER_DEFAULT_TYPE: pgsql
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adminer.rule=Host(`${ADMINER_HOSTNAME:-pg.${APP_HOSTNAME}}`)"
      - "traefik.http.routers.adminer.service=adminer@docker"
      - "traefik.http.services.adminer.loadbalancer.server.port=8080"
      - "traefik.docker.network=devpush_default"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  loki:
    profiles: ["optional"]
    image: grafana/loki:3.5.8
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - default
      - internal
    volumes:
      - loki-data:/loki
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3100/ready",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  alloy:
    profiles: ["optional"]
    image: grafana/alloy:v1.11.3
    command:
      - "run"
      - "/etc/alloy/config.alloy"
    restart: unless-stopped
    depends_on:
      - docker-proxy
      - loki
    networks:
      - default
      - internal
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${APP_DIR:-..}/docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy

volumes:
  devpush-db:
  devpush-mariadb:
  devpush-postgres-storage:
  loki-data:
  alloy-data:

networks:
  default:
    name: devpush_default
  internal:
    name: devpush_internal
    internal: true
  runner:
    name: devpush_runner
